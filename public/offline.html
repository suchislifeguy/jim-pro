<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Offline - JIM Pro</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#0f172a" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0; padding: 0; font-family: 'Inter', sans-serif;
      background-color: #0f172a; color: #ffffff;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; text-align: center;
    }
    .container { max-width: 400px; padding: 2rem; }
    .icon {
      width: 80px; height: 80px; background: rgba(249, 115, 22, 0.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1.5rem auto;
    }
    .icon svg { width: 40px; height: 40px; color: #f97316; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #94a3b8; line-height: 1.5; margin-bottom: 2rem; }
    button {
      background: #f97316; color: white; border: none; padding: 0.75rem 1.5rem;
      border-radius: 1rem; font-weight: 800; font-size: 0.875rem;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #ea580c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/-svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.163a1.5 1.5 0 112.121 2.121" />
      </svg>
    </div>
    <h1>You are offline</h1>
    <p>JIM Pro requires an internet connection to load this page. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
